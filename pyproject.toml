[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "urirun-flow"
version = "0.1.0"
description = "Author urirun URI flows in typed Python (Pydantic) and convert to/from YAML."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.9"
dependencies = ["pydantic>=2", "PyYAML>=6"]

[project.scripts]
urirun-flow = "urirun_flow.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
