name: ci

# Package CI for the real-source `urirun_flow` owner. Runtime execution tests are skipped
# automatically when `urirun` is not installed; authoring/validation/conformance must pass here.

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and run tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          python -m pytest tests -q
          urirun-flow --help
